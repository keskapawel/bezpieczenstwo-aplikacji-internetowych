# /etc/nginx/sites-available/securedesk
# Symlink do sites-enabled: sudo ln -s /etc/nginx/sites-available/securedesk /etc/nginx/sites-enabled/
#
# Architektura:
#   browser → nginx:80/443
#     /api/*  → proxy → Node.js:3001  (backend Express)
#     /*      → /var/www/securedesk   (frontend Vite build)
#
# Dzięki temu frontend używa relatywnych URL ("/api/...") bez CORS.

server {
    listen 80;
    server_name _;          # Zastąp swoją domeną lub IP, np.: server_name securedesk.example.com;

    # ─── Frontend (pliki statyczne Vite) ──────────────────────────────────
    root /var/www/securedesk;
    index index.html;

    # SPA routing — każda nieznana ścieżka trafia do index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Backend API proxy ─────────────────────────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Przekaż prawdziwe IP klienta (używane przez rate limiter)
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Wymagane dla WebSocket (na przyszłość) i keepalive
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       'upgrade';
        proxy_set_header   Host             $host;
        proxy_cache_bypass $http_upgrade;

        # Timeouty
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ─── Security headers (uzupełnienie helmet.js) ─────────────────────────
    add_header X-Frame-Options       "DENY"            always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy       "strict-origin"   always;

    # Wyłącz wykrywanie wersji nginx w nagłówkach
    server_tokens off;
}

